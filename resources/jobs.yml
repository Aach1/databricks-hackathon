resources:
  jobs:
    data_generation:
      name: "[${bundle.target}] Fraud Data Generation"
      tasks:
        - task_key: "generate_synthetic_data"
          notebook_task:
            notebook_path: ../src/jobs/data_gen.py
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    model_training:
      name: "[${bundle.target}] Hybrid DQN-XGBoost Training"
      tasks:
        - task_key: "train_hybrid_model"
          notebook_task:
            notebook_path: ../src/jobs/train.py
          new_cluster:
            spark_version: "13.3.x-machine-learning-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
          depends_on:
            - task_key: "generate_synthetic_data" # Optional if run sequentially manually, but good for workflow
      permissions:
        - level: CAN_VIEW
          group_name: "users"
